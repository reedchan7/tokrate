name: shellcheck

on:
  push:
    paths:
      - "install.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "install.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_paths: "reference"
